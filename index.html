    <link rel="stylesheet" href="style.css">
    <script>
        window.onload = function() {
            const randomSpan = document.getElementById('random-span');
            const spans = document.querySelectorAll('.bubbles span');
            let lastValue;
    
            spans.forEach(span => {
                let randomValue = Math.floor(Math.random() * 41) + 10;
    
                while (randomValue === lastValue) {
                    randomValue = Math.floor(Math.random() * 41) + 10;
                }
    
                lastValue = randomValue;
                span.style.setProperty('--i', randomValue);
            });
        };
    </script>
